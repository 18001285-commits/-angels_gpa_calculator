<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LANDING PAGE -->
<section id="landing" class="landing">
  <h1>Made for Your Improvement</h1>
  <p>GPA Calculator Tool</p>
  <p>Calculate your GPA instantly — Simple or College version</p>

  <button onclick="startApp()">Start Calculator</button>
</section>

<!-- APP WRAPPER -->
<main id="app" style="display:none;">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">ANGEL'S GPA CALCULATOR</div>

    <div class="nav-links">
      <a href="#" onclick="showPage('simple')">Simple GPA</a>
      <a href="#" onclick="showPage('college')">College GPA</a>
    </div>
  </nav>

  <!-- SIMPLE GPA -->
  <section id="simple" class="page">

    <div class="container">
      <h1>Simple GPA Calculator</h1>

      <div id="simple-classes">

        <div class="class">
          <label>Class 1:</label>

          <select class="simple-grade">
            <option value="4">A</option>
            <option value="3">B</option>
            <option value="2">C</option>
            <option value="1">D</option>
            <option value="0">F</option>
          </select>

          <button class="remove-btn">Remove</button>
        </div>

      </div>

      <button onclick="addSimpleClass()">Add Class</button>
      <button onclick="calculateSimpleGPA()">Calculate GPA</button>

      <p id="simple-result"></p>
    </div>

  </section>

  <!-- COLLEGE GPA -->
  <section id="college" class="page" style="display:none;">

    <div class="container">
      <h1>College GPA Calculator</h1>

      <div id="classes">

        <div class="class">
          <label>Class 1:</label>

          <select class="grade">
            <option value="4">A</option>
            <option value="3">B</option>
            <option value="2">C</option>
            <option value="1">D</option>
            <option value="0">F</option>
          </select>

          <label>Credits:</label>
          <input type="number" class="credits" value="3" min="1">
        </div>

      </div>

      <button onclick="addClass()">Add Class</button>
      <button onclick="calculateGPA()">Calculate GPA</button>

      <p id="result"></p>
    </div>

  </section>

</main>

<script src="script.js"></script>
</body>
</html>
